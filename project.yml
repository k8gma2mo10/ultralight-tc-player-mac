name: UltraLightTCPlayer
options:
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 6.0
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1
targets:
  UltraLightTCPlayer:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_NAME: UltraLightTCPlayer
        PRODUCT_BUNDLE_IDENTIFIER: io.github.k8gma2mo10.ultralight-tc-player-mac
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: UltraLight TC Player
        INFOPLIST_KEY_CFBundleShortVersionString: $(MARKETING_VERSION)
        INFOPLIST_KEY_CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.video
        INFOPLIST_KEY_NSHumanReadableCopyright: Copyright 2026 k8gma2mo10
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        ARCHS: arm64
